      <stop offset="45%" stop-color="#A882FF"/>
      <stop offset="100%" stop-color="#7C5CFF"/>
    </linearGradient>
    <linearGradient id="facet" x1="30%" y1="10%" x2="70%" y2="90%">
      <stop offset="0%" stop-color="#B794FF" stop-opacity="0.95"/>
